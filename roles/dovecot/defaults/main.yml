---
mailstack_dovecot_packages:
  - dovecot
  - dovecot-pigeonhole

mailstack_dovecot_protocols: imap pop3 lmtp sieve

# Virtual mailbox storage. All virtual users map to a single system user.
mailstack_dovecot_mail_root: /var/mail/vhosts
mailstack_dovecot_mail_location: "maildir:{{ mailstack_dovecot_mail_root }}/%d/%n"
mailstack_dovecot_vmail_user: vmail
mailstack_dovecot_vmail_group: vmail
mailstack_dovecot_vmail_uid: 5000
mailstack_dovecot_vmail_gid: 5000

# passwd-file passdb populated day-2 (one line per mailbox).
mailstack_dovecot_userdb_file: /etc/dovecot/users
mailstack_dovecot_password_scheme: ARGON2ID

mailstack_dovecot_postmaster_address: "postmaster@{{ ansible_domain | default('example.com') }}"

# TLS material (installed/renewed day-2). Provide the PEM contents to install
# them; leave empty to manage the files out of band (e.g. certbot).
mailstack_dovecot_tls_cert: /etc/pki/tls/certs/mail.crt
mailstack_dovecot_tls_key: /etc/pki/tls/private/mail.key
mailstack_dovecot_tls_cert_content: ""
mailstack_dovecot_tls_key_content: ""

# Firewall: IMAP (143), IMAPS (993), POP3 (110), POP3S (995).
mailstack_manage_firewall: true
mailstack_dovecot_firewall_ports:
  - 143/tcp
  - 993/tcp
  - 110/tcp
  - 995/tcp

# Day-2 mailboxes (managed by playbooks/provision.yml). Example:
#   mailstack_mailboxes:
#     - user: "alice@example.com"
#       password_hash: "{ARGON2ID}$argon2id$..."  # doveadm pw -s ARGON2ID
mailstack_mailboxes: []

mailstack_start_services: true
