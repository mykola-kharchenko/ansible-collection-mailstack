---
# Repository enablement toggles. On Fedora these are all no-ops (every package
# the stack needs ships in the base repos); they only take effect on RHEL and
# RHEL-family clones.
mailstack_enable_crb: true
mailstack_enable_epel: true
mailstack_enable_rspamd_repo: true

# CodeReady Builder repository id (RHEL family). The default matches Red Hat's
# subscription naming; clones (Rocky, Alma, CentOS Stream) typically use "crb".
mailstack_crb_repo_id: >-
  codeready-builder-for-rhel-{{ ansible_distribution_major_version }}-{{ ansible_architecture }}-rpms

# EPEL release package, fetched by URL on RHEL only.
mailstack_epel_release_url: >-
  https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm

# Upstream Rspamd RPM repository. Fedora ships Rspamd in its base repos, so this
# is RHEL-only. Pinned to the stable channel.
mailstack_rspamd_repo_baseurl: >-
  http://rspamd.com/rpm-stable/centos-{{ ansible_distribution_major_version }}/$basearch/
mailstack_rspamd_repo_gpgkey: https://rspamd.com/rpm-stable/gpg.key
