---
name: molecule

on:
  pull_request:
  push:
    branches: [main]

jobs:
  molecule:
    name: smoke scenario (podman + systemd)
    runs-on: ubuntu-latest
    # Set at the job level so `ansible-galaxy install` writes to the same path
    # Molecule searches — otherwise deps land in ~/.ansible and aren't found.
    env:
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
      ANSIBLE_FORCE_COLOR: "1"
    steps:
      # Check out into the collection path so FQCN role references resolve.
      - name: Check out
        uses: actions/checkout@v4
        with:
          path: ansible_collections/mykola_kharchenko/mailstack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Molecule and tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16" molecule "molecule-plugins[podman]"

      - name: Install collection dependencies
        working-directory: ansible_collections/mykola_kharchenko/mailstack
        run: |
          ansible-galaxy collection install -r requirements.yml
          # Required by the Molecule podman driver's create/destroy playbooks.
          ansible-galaxy collection install containers.podman

      - name: Run Molecule
        working-directory: ansible_collections/mykola_kharchenko/mailstack
        run: molecule test
