---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: podman
platforms:
  # `systemd: always` makes podman provision /run, /tmp and cgroups itself,
  # so no manual tmpfs/volumes/capabilities are needed.
  - name: mailstack-fedora
    image: quay.io/fedora/fedora:42
    systemd: always
    command: /usr/sbin/init
provisioner:
  name: ansible
verifier:
  name: ansible
